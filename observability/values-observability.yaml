# Helm values overlay for observability configuration.
# Apply alongside the base values when deploying hello-service:
#
#   helm upgrade --install hello-service ../helm/hello-service \
#     -f ../observability/values-observability.yaml \
#     --set image.tag=v1 --wait
#
# This file centralises all observability knobs so the platform team
# can tune scraping, logging, and future tracing settings in one place.

metrics:
  enabled: true
  path: /metrics
  portName: http
  interval: 30s
