{{- $metrics := .Values.metrics | default dict }}
{{- if $metrics.enabled }}
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: {{ include "hello-service.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "hello-service.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "hello-service.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: {{ $metrics.portName | default "http" }}
      interval: {{ $metrics.interval | default "30s" }}
      path: {{ $metrics.path | default "/metrics" }}
{{- end }}
