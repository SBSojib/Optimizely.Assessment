{{- $svc := .Values.service | default dict }}
{{- $img := .Values.image | default dict }}
{{- $probes := .Values.probes | default dict }}
{{- $readiness := $probes.readiness | default dict }}
{{- $liveness := $probes.liveness | default dict }}
{{- $resources := .Values.resources | default dict }}
{{- $podSec := .Values.podSecurityContext | default dict }}
{{- $containerSec := .Values.containerSecurityContext | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hello-service.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "hello-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "hello-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hello-service.selectorLabels" . | nindent 8 }}
      {{- $metrics := .Values.metrics | default dict }}
      {{- if $metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.targetPort | default 8080 }}"
        prometheus.io/path: "{{ $metrics.path | default "/metrics" }}"
      {{- end }}
    spec:
      serviceAccountName: {{ include "hello-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml $podSec | nindent 8 }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "hello-service.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "hello-service.selectorLabels" . | nindent 14 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ $img.repository | default "hello-service" }}:{{ $img.tag | default "latest" }}"
          imagePullPolicy: {{ $img.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml $containerSec | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $svc.targetPort | default 8080 }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: {{ $readiness.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ $readiness.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $readiness.periodSeconds | default 10 }}
          livenessProbe:
            httpGet:
              path: {{ $liveness.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ $liveness.initialDelaySeconds | default 10 }}
            periodSeconds: {{ $liveness.periodSeconds | default 15 }}
          resources:
            {{- toYaml $resources | nindent 12 }}
