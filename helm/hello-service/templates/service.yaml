apiVersion: v1
kind: Service
metadata:
  name: {{ include "hello-service.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "hello-service.labels" . | nindent 4 }}
spec:
  {{- $svc := .Values.service | default dict }}
  type: {{ $svc.type | default "ClusterIP" }}
  selector:
    {{- include "hello-service.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ $svc.port | default 80 }}
      targetPort: http
      protocol: TCP
      name: http
