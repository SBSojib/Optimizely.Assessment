{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hello-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hello-service.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.workloadIdentity.enabled }}
  annotations:
    iam.gke.io/gcp-service-account: {{ include "hello-service.gcpServiceAccountEmail" . }}
  {{- end }}
{{- end }}
