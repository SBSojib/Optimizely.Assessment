{{- $sa := .Values.serviceAccount | default dict }}
{{- $wi := $sa.workloadIdentity | default dict }}
{{- if $sa.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hello-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "hello-service.labels" . | nindent 4 }}
  {{- if $wi.enabled }}
  annotations:
    iam.gke.io/gcp-service-account: {{ include "hello-service.gcpServiceAccountEmail" . }}
  {{- end }}
{{- end }}
