name: CD – Deploy to GKE

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Minimal permissions.
# id-token: write  – required to exchange a GitHub OIDC token for a GCP access token.
# contents: read   – required to checkout the repository.
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build → Push → Deploy (dev)
    runs-on: ubuntu-latest

    # Targets the GitHub Environment named "dev".
    # All vars.* and secrets.* below are scoped to this environment.
    environment: dev

    # Immutable image reference used throughout this job.
    env:
      IMAGE: ${{ vars.ARTIFACT_REGISTRY_REPO }}:${{ github.sha }}

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Keyless GCP auth via OIDC / Workload Identity Federation ───────────
      #
      # No service-account JSON keys are used.
      # GitHub exchanges its OIDC token for a short-lived GCP access token by
      # impersonating the deployer SA through the configured WIF pool/provider.
      # Required environment secrets (dev): WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT.
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── 3. Container image ────────────────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        # Registers the AR hostname as a Docker credential helper using the
        # gcloud access token obtained in the auth step above.
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            --tag "${{ env.IMAGE }}" \
            --tag "${{ vars.ARTIFACT_REGISTRY_REPO }}:latest" \
            ./app

      - name: Push image
        # SHA tag is immutable and used for the actual deployment.
        # latest tag is a mutable convenience alias (useful for local pulls / tooling).
        run: |
          docker push "${{ env.IMAGE }}"
          docker push "${{ vars.ARTIFACT_REGISTRY_REPO }}:latest"

      # ── 4. Kubernetes credentials ──────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location:     ${{ vars.GKE_LOCATION }}
          project_id:   ${{ vars.GCP_PROJECT_ID }}

      # ── 5. Helm deploy ─────────────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Helm upgrade / install
        run: |
          KSA_NAME="${{ vars.HELLO_SERVICE_KSA_NAME }}"
          if [ -z "$KSA_NAME" ]; then
            echo "::error::Missing required GitHub Environment variable: HELLO_SERVICE_KSA_NAME"
            exit 1
          fi

          helm upgrade --install "${{ vars.HELM_RELEASE }}" helm/hello-service \
            --namespace "${{ vars.K8S_NAMESPACE }}" \
            --create-namespace \
            --set namespace="${{ vars.K8S_NAMESPACE }}" \
            --set global.projectId="${{ vars.GCP_PROJECT_ID }}" \
            --set image.repository="${{ vars.ARTIFACT_REGISTRY_REPO }}" \
            --set image.tag="${{ github.sha }}" \
            --set serviceAccount.create=true \
            --set serviceAccount.name="${KSA_NAME}" \
            --set serviceAccount.workloadIdentity.enabled=true \
            --set serviceAccount.gcpServiceAccount="${{ secrets.HELLO_SERVICE_GSA_EMAIL }}" \
            --set secrets.enabled=true \
            --set secrets.refs.API_KEY=hello-svc-api-key \
            --history-max 10 \
            --atomic \
            --timeout 5m
        # --atomic   : waits for all pods to become ready; automatically rolls back
        #              to the previous revision if the timeout is exceeded.
        # --history-max 10 : caps stored Helm release revisions to avoid unbounded
        #                    Secret accumulation in the cluster.

      # ── 6. Smoke test ──────────────────────────────────────────────────────────
      #
      # Port-forward the ClusterIP Service to the runner and probe /health.
      # This validates that the newly deployed pods are serving traffic correctly
      # without requiring a public ingress or LoadBalancer.
      - name: Smoke test (/health and /hello auth)
        id: smoke-test
        run: |
          kubectl port-forward \
            "svc/${{ vars.HELM_RELEASE }}" 8080:80 \
            --namespace "${{ vars.K8S_NAMESPACE }}" \
            &> /tmp/pf.log &
          PF_PID=$!

          # Wait for the tunnel to be reachable (retry up to ~60s).
          HTTP_STATUS=""
          for i in $(seq 1 30); do
            if HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 5 --connect-timeout 2 http://localhost:8080/health 2>/dev/null); then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Port-forward log:"
              cat /tmp/pf.log
              kill "$PF_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done

          kill "$PF_PID" 2>/dev/null || true

          HELLO_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 5 --connect-timeout 2 http://localhost:8080/hello)

          echo "Health endpoint returned HTTP $HTTP_STATUS"
          echo "Hello endpoint without credentials returned HTTP $HELLO_STATUS"
          [ "$HTTP_STATUS" -eq 200 ] && [ "$HELLO_STATUS" -eq 401 ]

      # Roll back to the previous revision when the smoke test fails so a broken
      # deploy does not stay live. Only runs when the smoke test step failed
      # (not on build/Helm failures, where there is nothing to revert).
      - name: Rollback on smoke test failure
        if: failure() && steps.smoke-test.outcome == 'failure'
        run: |
          helm rollback "${{ vars.HELM_RELEASE }}" --namespace "${{ vars.K8S_NAMESPACE }}"
          echo "Rolled back ${{ vars.HELM_RELEASE }} to previous revision."
