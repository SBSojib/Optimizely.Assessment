name: CI

on:
  pull_request:
    branches:
      - master
    # Avoid running full app CI for Terraform-only or docs-only PRs.
    paths-ignore:
      - "terraform/**"
      - "docs/**"
      - "**/*.md"

# Minimal permissions: repo checkout only. No writes, no packages, no deployments.
permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      docker: ${{ steps.filter.outputs.docker }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dotnet:
              - "app/**"
              - "tests/**"
              - "**/*.sln"
              - "**/*.csproj"
              - "NuGet.Config"
            docker:
              - "app/Dockerfile"
              - "app/**"
            helm:
              - "helm/**"

  # ── Job 1: Restore, compile, and test the .NET app ───────────────────────────
  dotnet:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.dotnet == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Optimizely.Assessment.sln

      - name: Build
        run: dotnet build Optimizely.Assessment.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Optimizely.Assessment.sln --no-build --configuration Release --logger "console;verbosity=normal"

  # ── Job 2: Validate the Dockerfile compiles cleanly (no push) ─────────────────
  docker:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    needs: [changes, dotnet]  # only attempt if app builds and Docker inputs changed
    if: ${{ needs.changes.outputs.docker == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag hello-service:ci ./app

  # ── Job 3: Lint and render the Helm chart (runs in parallel with dotnet) ──────
  helm:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.helm == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint chart
        run: helm lint helm/hello-service -f helm/hello-service/values.yaml.example

      # Render all templates to catch missing keys, bad conditionals, etc.
      - name: Render templates
        run: helm template hello-service helm/hello-service -f helm/hello-service/values.yaml.example
