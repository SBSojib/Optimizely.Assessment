# Terraform Drift Detection
#
# Runs `terraform plan` on a schedule to detect infrastructure changes made
# outside of Terraform (manual console edits, other tooling, etc.).
# Uses a dedicated read-only SA (roles/viewer + GCS state read); same WIF pool.
#
# Exit-code semantics of `terraform plan -detailed-exitcode`:
#   0 = no changes  (infrastructure matches config)
#   1 = error       (plan could not complete)
#   2 = changes     (drift detected)
#
# ── Required GitHub configuration (scoped to the "dev" environment) ──────────
#
# Secrets (reuse from CD pipeline):
#   WORKLOAD_IDENTITY_PROVIDER  – WIF provider (same as deploy; no separate drift provider)
#
# Secrets (drift-only; set from terraform output after apply):
#   DRIFT_GCP_SERVICE_ACCOUNT   – Email of the drift SA (e.g. opti-dev-gh-drift@PROJECT.iam.gserviceaccount.com)
#
# Secrets (tfvars for plan):
#   TF_VARS  – combined HCL content of the gitignored *.auto.tfvars files
#              (common + networking + gke + apps). Multiline string.
#
# Environment variables (vars.*):
#   TF_STATE_BUCKET  – GCS bucket that holds Terraform state
#   TF_STATE_PREFIX  – object prefix inside the bucket
# ─────────────────────────────────────────────────────────────────────────────

name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  detect-drift:
    name: Detect drift (dev)
    runs-on: ubuntu-latest
    environment: dev

    env:
      TF_ROOT: terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC, drift SA)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DRIFT_GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          terraform_wrapper: false

      - name: Write variable definitions
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: printf '%s\n' "$TF_VARS" > ci.auto.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ vars.TF_STATE_PREFIX }}"

      - name: Terraform Plan (detect drift)
        id: plan
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color -lock=false -out=tfplan.binary
          PLAN_EXIT=$?
          echo "exitcode=$PLAN_EXIT" >> "$GITHUB_OUTPUT"
          # Full diff (terraform show reveals every changed attribute; plan output hides some)
          terraform show -no-color tfplan.binary > plan.txt 2>/dev/null || true

      - name: Evaluate result
        env:
          EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
          TF_ROOT: ${{ env.TF_ROOT }}
        run: |
          case "$EXIT_CODE" in
            0)
              echo "### No drift detected" >> "$GITHUB_STEP_SUMMARY"
              echo "Infrastructure matches the Terraform configuration." >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              echo "### Drift detected" >> "$GITHUB_STEP_SUMMARY"
              echo "Infrastructure has diverged from the Terraform configuration." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Changed attribute(s):**" >> "$GITHUB_STEP_SUMMARY"
              CHANGED=$(cd "${TF_ROOT}" && terraform show -json tfplan.binary 2>/dev/null | jq -r '
                def fmt_path($path):
                  reduce $path[] as $part
                    ("";
                      . + if ($part | type) == "number"
                          then "[\($part)]"
                          else ".\($part)"
                          end
                    );
                def read_path($obj; $path):
                  try ($obj | getpath($path)) catch null;

                .resource_changes[]?
                | select((.change.actions | index("update")) != null)
                | . as $r
                | (
                    [(.change.before // {}) | paths(scalars)]
                    + [(.change.after // {}) | paths(scalars)]
                    + [(.change.after_unknown // {}) | paths(scalars)]
                  ) | unique[] as $path
                | select(
                    (read_path($r.change.before; $path) | tostring) != (read_path($r.change.after; $path) | tostring)
                    or read_path($r.change.after_unknown; $path) == true
                  )
                | "\($r.address): \(fmt_path($path))"
              ' 2>/dev/null)
              echo "$CHANGED" >> "$GITHUB_STEP_SUMMARY"
              if [ -n "$CHANGED" ]; then
                echo "Changed attribute paths:"
                echo "$CHANGED"
              else
                echo "_Could not list changed attribute paths. Review the full plan output below before changing lifecycle ignore rules._" >> "$GITHUB_STEP_SUMMARY"
                echo "Could not list changed attribute paths from terraform show -json."
              fi
              RAW_CLUSTER_JSON=$(cd "${TF_ROOT}" && terraform show -json tfplan.binary 2>/dev/null | jq '
                .resource_changes[]?
                | select(.address == "module.gke.google_container_cluster.primary")
              ' 2>/dev/null)
              if [ -n "$RAW_CLUSTER_JSON" ]; then
                echo ""
                echo "Raw JSON for module.gke.google_container_cluster.primary:"
                echo "$RAW_CLUSTER_JSON"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "<details><summary>Raw JSON for module.gke.google_container_cluster.primary</summary>" >> "$GITHUB_STEP_SUMMARY"
                echo '```json' >> "$GITHUB_STEP_SUMMARY"
                echo "$RAW_CLUSTER_JSON" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                echo "</details>" >> "$GITHUB_STEP_SUMMARY"
              else
                echo ""
                echo "Could not extract raw JSON for module.gke.google_container_cluster.primary."
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "_Could not extract raw JSON for module.gke.google_container_cluster.primary._" >> "$GITHUB_STEP_SUMMARY"
              fi
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "<details><summary>Full plan output (click to expand)</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat "${TF_ROOT}/plan.txt" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::DRIFT DETECTED — review the changed attribute paths above and only ignore provider-managed fields if they are benign."
              exit 1
              ;;
            *)
              echo "### Plan error (exit code $EXIT_CODE)" >> "$GITHUB_STEP_SUMMARY"
              echo "Terraform plan failed. Expand the **Terraform Plan (detect drift)** step above for the error (e.g. variable, provider, or permission)." >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Terraform plan failed (exit $EXIT_CODE). See the 'Terraform Plan (detect drift)' step for the error."
              exit 1
              ;;
          esac
